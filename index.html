<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bonus Content</title>
  <style>
    :root {
      --gold: #e8c56e;
      --cream: #fff4d4;
      --ink: #050403;
      --panel: rgba(7, 5, 4, 0.92);
      --line: rgba(232, 197, 110, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #050403;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 50% 14%, rgba(95, 62, 27, 0.36), transparent 28rem),
        radial-gradient(circle at 50% 72%, rgba(95, 62, 27, 0.24), transparent 32rem),
        #050403;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.03) 0,
          rgba(255, 255, 255, 0.03) 1px,
          transparent 1px,
          transparent 5px
        );
      mix-blend-mode: overlay;
      opacity: 0.38;
      z-index: 10;
    }

    .page {
      width: 100%;
      min-height: 100svh;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .menu-shell {
      position: relative;
      width: min(100vw, 560px);
      background: #050403;
      box-shadow: 0 0 48px rgba(0, 0, 0, 0.85);
    }

    .menu-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      border: 0;
      border-radius: 18px;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(232, 197, 110, 0.24);
    }

    .hotspot::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      transition: background 150ms ease, box-shadow 150ms ease, outline-color 150ms ease;
    }

    .hotspot:hover::after,
    .hotspot:focus-visible::after {
      background: rgba(232, 197, 110, 0.08);
      box-shadow:
        inset 0 0 0 2px rgba(255, 239, 194, 0.58),
        0 0 24px rgba(232, 197, 110, 0.25);
      outline: 2px solid rgba(255, 239, 194, 0.85);
      outline-offset: 3px;
    }

    .hotspot:focus-visible {
      outline: none;
    }

    .hotspot-stag {
      left: 4.5%;
      top: 13.0%;
      width: 91%;
      height: 17.0%;
    }

    .hotspot-stats {
      left: 4.5%;
      top: 30.2%;
      width: 91%;
      height: 18.2%;
    }

    .hotspot-chat {
      left: 4.5%;
      top: 48.8%;
      width: 91%;
      height: 18.6%;
    }

    .hotspot-chris {
      left: 4.5%;
      top: 67.8%;
      width: 91%;
      height: 26.0%;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding:
        max(12px, env(safe-area-inset-top))
        18px
        max(18px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 50% 24%, rgba(121, 83, 38, 0.28), transparent 24rem),
        rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(5px);
    }

    .modal.active {
      display: flex;
    }

    .panel {
      position: relative;
      width: min(100%, 560px);
      max-height: calc(100dvh - max(12px, env(safe-area-inset-top)) - max(18px, env(safe-area-inset-bottom)) - 12px);
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 26px 24px 24px;
      border: 1px solid var(--line);
      border-radius: 24px 24px 18px 18px;
      background:
        linear-gradient(180deg, rgba(49, 30, 11, 0.62), rgba(7, 5, 4, 0.96) 38%),
        var(--panel);
      box-shadow:
        0 -10px 45px rgba(0, 0, 0, 0.62),
        inset 0 0 28px rgba(232, 197, 110, 0.08);
    }

    .panel::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      width: 54px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 244, 212, 0.34);
      transform: translateX(-50%);
    }

    .panel h2 {
      margin: 18px 44px 12px 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.65rem, 7vw, 2.6rem);
      line-height: 1;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 0 #000, 0 0 16px rgba(232, 197, 110, 0.26);
    }

    .panel p {
      margin: 0 0 16px;
      font-size: 1rem;
      line-height: 1.58;
      color: rgba(255, 244, 212, 0.86);
    }

    .panel ul {
      margin: 16px 0 0;
      padding-left: 20px;
      color: rgba(255, 244, 212, 0.86);
    }

    .panel li {
      margin: 8px 0;
      line-height: 1.45;
    }

    .close-button {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 244, 212, 0.48);
      border-radius: 999px;
      color: var(--cream);
      background: rgba(0, 0, 0, 0.38);
      font-size: 1.65rem;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
    }

    .close-button:hover,
    .close-button:focus-visible {
      outline: none;
      color: #fff;
      border-color: var(--gold);
      box-shadow: 0 0 18px rgba(232, 197, 110, 0.28);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }


    .gallery-section {
      margin-top: 22px;
    }

    .gallery-section:first-of-type {
      margin-top: 18px;
    }

    .gallery-section-title {
      margin: 0 0 12px;
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.25rem, 5vw, 1.75rem);
      line-height: 1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-shadow: 0 2px 0 #000, 0 0 12px rgba(232, 197, 110, 0.22);
    }

    .gallery-section-note {
      margin: -4px 0 12px;
      color: rgba(255, 244, 212, 0.66);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .photo-card {
      position: relative;
      display: block;
      overflow: hidden;
      min-height: 132px;
      border: 1px solid rgba(232, 197, 110, 0.34);
      border-radius: 14px;
      padding: 0;
      background: rgba(0, 0, 0, 0.42);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.28);
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .photo-card:hover img,
    .photo-card:focus-visible img {
      transform: scale(1.045);
      filter: brightness(1.08);
    }

    .photo-card:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }

    .lightbox-modal {
      z-index: 80;
      align-items: center;
      padding: 12px;
      background: rgba(0, 0, 0, 0.9);
    }

    .lightbox-panel {
      position: relative;
      width: min(100%, 980px);
      max-height: 92svh;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(232, 197, 110, 0.58);
      border-radius: 20px;
      background: rgba(5, 4, 3, 0.96);
      box-shadow: 0 0 48px rgba(0, 0, 0, 0.88);
    }

    .lightbox-panel::before {
      display: none;
    }

    .lightbox-image-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44svh;
      overflow: hidden;
      border-radius: 14px;
      background: #000;
    }

    .lightbox-image {
      display: block;
      max-width: 100%;
      max-height: 72svh;
      object-fit: contain;
    }

    .lightbox-caption {
      margin: 0;
      padding: 0 48px;
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255, 244, 212, 0.72);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 244, 212, 0.5);
      border-radius: 999px;
      color: var(--cream);
      background: rgba(0, 0, 0, 0.56);
      font-size: 1.8rem;
      line-height: 1;
      cursor: pointer;
      transform: translateY(-50%);
    }

    .lightbox-prev {
      left: 16px;
    }

    .lightbox-next {
      right: 16px;
    }

    .lightbox-nav:hover,
    .lightbox-nav:focus-visible {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 18px rgba(232, 197, 110, 0.28);
    }

    .video-panel {
      padding: 22px;
    }

    .video-panel h2 {
      margin-top: 22px;
      font-size: clamp(1.45rem, 6vw, 2.15rem);
    }

    .video-frame {
      overflow: hidden;
      border: 1px solid rgba(232, 197, 110, 0.56);
      border-radius: 16px;
      background: #000;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.52);
    }

    video {
      display: block;
      width: 100%;
      max-height: 68svh;
      background: #000;
    }

    .fallback-note {
      display: block;
      margin-top: 14px;
      color: rgba(255, 244, 212, 0.68);
      font-size: 0.88rem;
      line-height: 1.45;
    }


    .stats-intro {
      margin-bottom: 18px;
    }

    .stats-dashboard {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .stat-card,
    .chart-card,
    .distance-card,
    .names-card {
      border: 1px solid rgba(232, 197, 110, 0.34);
      border-radius: 18px;
      padding: 16px;
      background:
        linear-gradient(180deg, rgba(255, 244, 212, 0.07), rgba(0, 0, 0, 0.18)),
        rgba(0, 0, 0, 0.34);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    .stat-kicker,
    .chart-kicker {
      display: block;
      margin-bottom: 8px;
      color: rgba(232, 197, 110, 0.86);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .stat-number {
      margin: 0;
      color: #fff4d4;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 13vw, 4.4rem);
      font-weight: 900;
      line-height: 0.9;
      text-shadow: 0 2px 0 #000, 0 0 18px rgba(232, 197, 110, 0.22);
    }

    .stat-caption {
      margin: 10px 0 0;
      color: rgba(255, 244, 212, 0.76);
      font-size: 0.92rem;
      line-height: 1.42;
    }

    .gender-split {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .gender-bar {
      overflow: hidden;
      border-radius: 999px;
      height: 26px;
      display: flex;
      border: 1px solid rgba(255, 244, 212, 0.18);
      background: rgba(0, 0, 0, 0.36);
    }

    .gender-segment {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      color: #071107;
      font-size: 0.7rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .gender-segment.male {
      width: 71.1%;
      background: linear-gradient(90deg, #fff4d4, #e8c56e);
    }

    .gender-segment.female {
      width: 28.9%;
      background: linear-gradient(90deg, #d7ffd9, #64ec80);
    }

    .legend-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: rgba(255, 244, 212, 0.84);
      font-size: 0.88rem;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--swatch, #e8c56e);
      box-shadow: 0 0 12px rgba(232, 197, 110, 0.2);
    }

    .legend-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .donut-wrap {
      display: grid;
      grid-template-columns: 132px 1fr;
      gap: 14px;
      align-items: center;
      margin-top: 12px;
    }

    .donut {
      position: relative;
      width: 132px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(#64ec80 0 54.7%, rgba(255, 244, 212, 0.12) 54.7% 100%);
      box-shadow: inset 0 0 0 1px rgba(255, 244, 212, 0.16), 0 0 24px rgba(100, 236, 128, 0.14);
    }

    .donut::after {
      content: "55%";
      position: absolute;
      inset: 19px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff4d4;
      background: #080604;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2rem;
      font-weight: 900;
      box-shadow: inset 0 0 20px rgba(232, 197, 110, 0.08);
    }

    .breakdown-chart {
      display: grid;
      gap: 11px;
      margin-top: 14px;
    }

    .breakdown-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .breakdown-label {
      color: rgba(255, 244, 212, 0.84);
      font-size: 0.86rem;
      line-height: 1.25;
    }

    .breakdown-value {
      color: #e8c56e;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .breakdown-track {
      grid-column: 1 / -1;
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.38);
      box-shadow: inset 0 0 0 1px rgba(255, 244, 212, 0.1);
    }

    .breakdown-fill {
      display: block;
      height: 100%;
      width: var(--width);
      border-radius: inherit;
      background: linear-gradient(90deg, #e8c56e, #fff4d4);
      box-shadow: 0 0 14px rgba(232, 197, 110, 0.22);
    }

    .names-grid {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .name-rank {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.26);
      border: 1px solid rgba(255, 244, 212, 0.12);
    }

    .name-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .name-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      color: #071107;
      background: linear-gradient(180deg, #fff4d4, #e8c56e);
      font-weight: 900;
      font-size: 0.86rem;
    }

    .name-count {
      flex: 0 0 auto;
      color: rgba(255, 244, 212, 0.72);
      font-size: 0.82rem;
      font-weight: 900;
      text-align: right;
    }

    .podium {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .podium-place {
      position: relative;
      padding: 14px 14px 14px 54px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 244, 212, 0.14);
    }

    .podium-place::before {
      content: attr(data-rank);
      position: absolute;
      left: 14px;
      top: 14px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #071107;
      background: linear-gradient(180deg, #fff4d4, #e8c56e);
      font-weight: 900;
    }

    .podium-name {
      display: block;
      color: #fff4d4;
      font-weight: 900;
      font-size: 1rem;
    }

    .podium-location {
      display: block;
      margin-top: 4px;
      color: rgba(255, 244, 212, 0.72);
      font-size: 0.86rem;
      line-height: 1.35;
    }

    @media (max-width: 370px) {
      .donut-wrap {
        grid-template-columns: 1fr;
      }

      .donut {
        margin-inline: auto;
      }
    }

    @media (min-width: 760px) {
      .stats-row.two-up {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }


    .chat-game-intro {
      margin-bottom: 18px;
    }

    .chat-game {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .chat-card {
      border: 1px solid rgba(232, 197, 110, 0.34);
      border-radius: 18px;
      padding: 16px;
      background:
        linear-gradient(180deg, rgba(255, 244, 212, 0.06), rgba(0, 0, 0, 0.2)),
        rgba(0, 0, 0, 0.34);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    .chat-date {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(232, 197, 110, 0.88);
    }

    .chat-phrase {
      margin: 0 0 14px;
      font-size: 1.02rem;
      line-height: 1.55;
      color: rgba(255, 244, 212, 0.92);
      white-space: pre-line;
    }

    .redacted-word {
      display: inline-block;
      min-width: 5.9em;
      padding: 0.08em 0.38em;
      border-radius: 0.35em;
      color: transparent;
      background: linear-gradient(180deg, #ffe58a, #d6a72f);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.36),
        inset 0 -8px 14px rgba(91, 55, 0, 0.18),
        0 0 15px rgba(232, 197, 110, 0.34);
      vertical-align: baseline;
      user-select: none;
    }

    .chat-card.solved .redacted-word {
      min-width: 0;
      color: #071107;
      font-weight: 800;
      background: linear-gradient(180deg, #9dff9d, #45d66a);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.42),
        0 0 18px rgba(82, 255, 126, 0.26);
      user-select: text;
    }

    .guess-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: center;
    }

    .guess-input {
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(255, 244, 212, 0.32);
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--cream);
      background: rgba(0, 0, 0, 0.42);
      font: 700 1rem Arial, Helvetica, sans-serif;
    }

    .guess-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(232, 197, 110, 0.18);
    }

    .guess-input.correct {
      border-color: #5cff86;
      background: rgba(19, 92, 42, 0.34);
      box-shadow: 0 0 0 3px rgba(92, 255, 134, 0.16);
    }

    .guess-feedback {
      min-height: 1.3em;
      margin: 8px 0 0;
      font-size: 0.85rem;
      color: rgba(255, 244, 212, 0.64);
    }

    .letter-clue {
      min-height: 1.35em;
      margin: 6px 0 0;
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255, 232, 165, 0.82);
    }

    .letter-meter {
      display: block;
      width: 100%;
      height: 8px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.38);
      box-shadow: inset 0 0 0 1px rgba(255, 244, 212, 0.12);
    }

    .letter-meter-fill {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #e8c56e, #fff1b5);
      transition: width 160ms ease;
    }

    .chat-card.solved .guess-feedback,
    .chat-card.solved .letter-clue {
      color: #8dff9e;
      font-weight: 700;
    }

    .chat-card.solved .letter-meter-fill {
      width: 100% !important;
      background: linear-gradient(90deg, #5cff86, #d7ffd9);
    }

    .unlock-message {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border: 1px solid rgba(92, 255, 134, 0.72);
      border-radius: 18px;
      color: #071107;
      background: linear-gradient(180deg, #d7ffd9, #64ec80);
      font-weight: 900;
      line-height: 1.45;
      text-align: center;
      box-shadow: 0 0 26px rgba(92, 255, 134, 0.28);
    }

    .unlock-message.visible {
      display: block;
    }

    .secret-order-modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 232, 165, 0.26), transparent 18rem),
        radial-gradient(circle at 20% 18%, rgba(92, 255, 134, 0.18), transparent 12rem),
        radial-gradient(circle at 86% 78%, rgba(232, 197, 110, 0.22), transparent 14rem),
        rgba(0, 0, 0, 0.93);
      backdrop-filter: blur(7px);
    }

    .secret-order-modal.active {
      display: flex;
    }

    .secret-order-modal::before,
    .secret-order-modal::after {
      content: "🍾 ✨ 🥃 ✨ 🎉 ✨ 🥃 ✨ 🍾";
      position: absolute;
      left: -10%;

    function renderStagGallery() {
      let photoIndexOffset = 0;

      const gallerySections = stagPhotoGroups.map(function (group) {
        const photoCards = group.files.map(function (fileName, index) {
          const globalIndex = photoIndexOffset + index;

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderChatGame() {
      const cards = chatChallenges.map(function (challenge, index) {
        const redactedLength = Math.max(6, challenge.answer.length);
        return `
          <article class="chat-card" data-chat-index="${index}">
            <span class="chat-date">${escapeHtml(challenge.date)}</span>
            <p class="chat-phrase">
              ${escapeHtml(challenge.phraseParts[0])}<span class="redacted-word" data-redacted>${"█".repeat(redactedLength)}</span>${escapeHtml(challenge.phraseParts[1])}
            </p>
            <div class="guess-row">
              <input class="guess-input" type="text" data-guess-input autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="Type the missing word(s)" aria-label="Guess missing words for phrase ${index + 1}" />
            </div>
            <p class="guess-feedback" data-feedback aria-live="polite">Keep typing — it will unlock automatically when correct.</p>
            <p class="letter-clue" data-letter-clue aria-live="polite">Clue: start typing to see how close your letters are.</p>
            <span class="letter-meter" aria-hidden="true"><span class="letter-meter-fill" data-letter-meter></span></span>
          </article>
        `;
      }).join("");

      return `
        <p class="chat-game-intro">Here are six messages from the early days of our relationship, one or more words are missing from each one. Type the missing word or words, and if you get it right, that phrase will unlock. Get all 6 correct to unlock the secret bar order.</p>
        <div class="chat-game" id="chat-game">
          ${cards}
        </div>
        <div class="unlock-message" id="unlock-message" role="status" aria-live="polite">
          Congratulations, you've unlocked the secret bar order, you may now ask for Jägerbombs
        </div>
      `;
    }

    function normaliseGuess(value) {
      return String(value)
        .toLowerCase()
        .replace(/[’']/g, "")
        .replace(/[^a-z0-9]+/g, " ")
        .trim()
        .replace(/\s+/g, " ");
    }

    function lettersOnly(value) {
      return normaliseGuess(value).replace(/[^a-z0-9]/g, "");
    }

    function countMatchingTypedLetters(guess, answer) {
      const guessLetters = lettersOnly(guess);
      const answerLetters = lettersOnly(answer);
      const remaining = {};
      let matches = 0;

      for (const letter of answerLetters) {
        remaining[letter] = (remaining[letter] || 0) + 1;
      }

      for (const letter of guessLetters) {
        if (remaining[letter] > 0) {
          matches += 1;
          remaining[letter] -= 1;
        }
      }

      return {
        matches: matches,
        typed: guessLetters.length,
        answerLength: answerLetters.length,
        percentage: answerLetters.length ? Math.round((matches / answerLetters.length) * 100) : 0
      };
    }

    function attachChatGame() {
      const game = sectionBody.querySelector("#chat-game");
      if (!game) return;

      game.querySelectorAll(".chat-card").forEach(function (card) {
        const index = Number(card.dataset.chatIndex);
        const challenge = chatChallenges[index];
        const input = card.querySelector("[data-guess-input]");
        const feedback = card.querySelector("[data-feedback]");
        const redacted = card.querySelector("[data-redacted]");
        const letterClue = card.querySelector("[data-letter-clue]");
        const letterMeter = card.querySelector("[data-letter-meter]");

        function updateLetterClue() {
          const clue = countMatchingTypedLetters(input.value, challenge.answer);

          if (clue.typed === 0) {
            letterClue.textContent = "Clue: start typing to see how close your letters are.";
            letterMeter.style.width = "0%";
            return;
          }

          letterClue.textContent = `Clue: ${clue.matches} of ${clue.answerLength} answer letters found (${clue.percentage}%).`;
          letterMeter.style.width = Math.min(100, clue.percentage) + "%";
        }

        function checkAnswer() {
          updateLetterClue();
          const isCorrect = normaliseGuess(input.value) === normaliseGuess(challenge.answer);

          if (isCorrect) {
            card.classList.add("solved");
            input.classList.add("correct");
            input.disabled = true;
            redacted.textContent = challenge.answer;
            feedback.textContent = "Correct!";
            letterClue.textContent = "Clue: 100% — fully restored.";
            letterMeter.style.width = "100%";
            checkUnlockMessage();
          } else {
            feedback.textContent = "Keep typing — it will unlock automatically when correct.";
          }
        }

        input.addEventListener("input", checkAnswer);
      });
    }

    function checkUnlockMessage() {
      const solvedCards = sectionBody.querySelectorAll(".chat-card.solved").length;
      const unlockMessage = sectionBody.querySelector("#unlock-message");
      if (unlockMessage && solvedCards === chatChallenges.length) {
        unlockMessage.classList.add("visible");
        showSecretOrderCelebration();
      }
    }

    function showSecretOrderCelebration() {
      if (!secretOrderModal || secretOrderModal.classList.contains("active")) return;
      secretOrderModal.classList.add("active");
      secretOrderModal.setAttribute("aria-hidden", "false");
      const closeButton = secretOrderModal.querySelector("[data-close-secret]");
      if (closeButton) closeButton.focus();
    }

    function closeSecretOrderCelebration() {
      if (!secretOrderModal) return;
      secretOrderModal.classList.remove("active");
      secretOrderModal.setAttribute("aria-hidden", "true");
    }

    function openSection(sectionKey) {
      const section = sections[sectionKey];
      if (!section) return;

      lastFocusedElement = document.activeElement;
      sectionTitle.textContent = section.title;
      sectionBody.innerHTML = section.body;
      sectionModal.classList.add("active");
      sectionModal.setAttribute("aria-hidden", "false");
      sectionModal.querySelector("[data-close]").focus();

      if (sectionKey === "stag") {
        sectionBody.querySelectorAll("[data-photo-index]").forEach(function (button) {
          button.addEventListener("click", function () {
            openPhoto(Number(button.dataset.photoIndex));
          });
        });
      }

      if (sectionKey === "chat") {
        attachChatGame();
      }
    }

    function closeSection() {
      sectionModal.classList.remove("active");
      sectionModal.setAttribute("aria-hidden", "true");
      if (lastFocusedElement) lastFocusedElement.focus();
    }

    function openVideo() {
      lastFocusedElement = document.activeElement;
      videoModal.classList.add("active");
      videoModal.setAttribute("aria-hidden", "false");
      videoModal.querySelector("[data-close-video]").focus();

      chrisVideo.play().catch(function () {
        // Mobile browsers may wait for the user to press play.
      });
    }

    function closeVideo() {
      chrisVideo.pause();
      chrisVideo.currentTime = 0;
      videoModal.classList.remove("active");
      videoModal.setAttribute("aria-hidden", "true");
      if (lastFocusedElement) lastFocusedElement.focus();
    }

    function openPhoto(index) {
      currentPhotoIndex = index;
      updatePhoto();
      photoLightbox.classList.add("active");
      photoLightbox.setAttribute("aria-hidden", "false");
      photoLightbox.querySelector("[data-close-lightbox]").focus();
    }

    function closePhoto() {
      photoLightbox.classList.remove("active");
      photoLightbox.setAttribute("aria-hidden", "true");
    }

    function updatePhoto() {
      const photo = stagPhotos[currentPhotoIndex];
      lightboxImage.src = photo.src;
      lightboxImage.alt = photo.alt;
      lightboxCaption.textContent = photo.group + " photo " + photo.indexInGroup + " of " + stagPhotos.length + " total";
    }

    function showNextPhoto() {
      currentPhotoIndex = (currentPhotoIndex + 1) % stagPhotos.length;
      updatePhoto();
    }

    function showPreviousPhoto() {
      currentPhotoIndex = (currentPhotoIndex - 1 + stagPhotos.length) % stagPhotos.length;
      updatePhoto();
    }

    document.querySelectorAll(".hotspot").forEach(function (hotspot) {
      hotspot.addEventListener("click", function () {
        const section = hotspot.dataset.section;
        if (section === "chris") {
          openVideo();
        } else {
          openSection(section);
        }
      });
    });

    document.querySelector("[data-close]").addEventListener("click", closeSection);
    document.querySelector("[data-close-video]").addEventListener("click", closeVideo);
    document.querySelector("[data-close-lightbox]").addEventListener("click", closePhoto);
    document.querySelector("[data-close-secret]").addEventListener("click", closeSecretOrderCelebration);
    document.querySelector("[data-photo-next]").addEventListener("click", showNextPhoto);
    document.querySelector("[data-photo-prev]").addEventListener("click", showPreviousPhoto);

    sectionModal.addEventListener("click", function (event) {
      if (event.target === sectionModal) closeSection();
    });

    videoModal.addEventListener("click", function (event) {
      if (event.target === videoModal) closeVideo();
    });

    photoLightbox.addEventListener("click", function (event) {
      if (event.target === photoLightbox) closePhoto();
    });

    secretOrderModal.addEventListener("click", function (event) {
      if (event.target === secretOrderModal) closeSecretOrderCelebration();
    });

    document.addEventListener("keydown", function (event) {
      if (photoLightbox.classList.contains("active")) {
        if (event.key === "ArrowRight") showNextPhoto();
        if (event.key === "ArrowLeft") showPreviousPhoto();
        if (event.key === "Escape") closePhoto();
        return;
      }

      if (event.key !== "Escape") return;
      if (secretOrderModal.classList.contains("active")) closeSecretOrderCelebration();
      if (videoModal.classList.contains("active")) closeVideo();
      if (sectionModal.classList.contains("active")) closeSection();
    });
  </script>
</body>
</html>
