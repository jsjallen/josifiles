<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bonus Content</title>
  <style>
    :root {
      --gold: #e8c56e;
      --cream: #fff4d4;
      --ink: #050403;
      --panel: rgba(7, 5, 4, 0.92);
      --line: rgba(232, 197, 110, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #050403;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 50% 14%, rgba(95, 62, 27, 0.36), transparent 28rem),
        radial-gradient(circle at 50% 72%, rgba(95, 62, 27, 0.24), transparent 32rem),
        #050403;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.03) 0,
          rgba(255, 255, 255, 0.03) 1px,
          transparent 1px,
          transparent 5px
        );
      mix-blend-mode: overlay;
      opacity: 0.38;
      z-index: 10;
    }

    .page {
      width: 100%;
      min-height: 100svh;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .menu-shell {
      position: relative;
      width: min(100vw, 560px);
      background: #050403;
      box-shadow: 0 0 48px rgba(0, 0, 0, 0.85);
    }

    .menu-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      border: 0;
      border-radius: 18px;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(232, 197, 110, 0.24);
    }

    .hotspot::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      transition: background 150ms ease, box-shadow 150ms ease, outline-color 150ms ease;
    }

    .hotspot:hover::after,
    .hotspot:focus-visible::after {
      background: rgba(232, 197, 110, 0.08);
      box-shadow:
        inset 0 0 0 2px rgba(255, 239, 194, 0.58),
        0 0 24px rgba(232, 197, 110, 0.25);
      outline: 2px solid rgba(255, 239, 194, 0.85);
      outline-offset: 3px;
    }

    .hotspot:focus-visible {
      outline: none;
    }

    .hotspot-stag {
      left: 4.5%;
      top: 13.4%;
      width: 91%;
      height: 16.3%;
    }

    .hotspot-stats {
      left: 4.5%;
      top: 30.9%;
      width: 91%;
      height: 17.2%;
    }

    .hotspot-chat {
      left: 4.5%;
      top: 49.4%;
      width: 91%;
      height: 17.4%;
    }

    .hotspot-chris {
      left: 4.5%;
      top: 67.4%;
      width: 91%;
      height: 18.2%;
    }

    .hotspot-tbc {
      left: 4.5%;
      top: 85.2%;
      width: 91%;
      height: 10.7%;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 24%, rgba(121, 83, 38, 0.28), transparent 24rem),
        rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(5px);
    }

    .modal.active {
      display: flex;
    }

    .panel {
      position: relative;
      width: min(100%, 560px);
      max-height: min(72svh, 720px);
      overflow: auto;
      padding: 26px 24px 24px;
      border: 1px solid var(--line);
      border-radius: 24px 24px 18px 18px;
      background:
        linear-gradient(180deg, rgba(49, 30, 11, 0.62), rgba(7, 5, 4, 0.96) 38%),
        var(--panel);
      box-shadow:
        0 -10px 45px rgba(0, 0, 0, 0.62),
        inset 0 0 28px rgba(232, 197, 110, 0.08);
    }

    .panel::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      width: 54px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 244, 212, 0.34);
      transform: translateX(-50%);
    }

    .panel h2 {
      margin: 18px 44px 12px 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.65rem, 7vw, 2.6rem);
      line-height: 1;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 0 #000, 0 0 16px rgba(232, 197, 110, 0.26);
    }

    .panel p {
      margin: 0 0 16px;
      font-size: 1rem;
      line-height: 1.58;
      color: rgba(255, 244, 212, 0.86);
    }

    .panel ul {
      margin: 16px 0 0;
      padding-left: 20px;
      color: rgba(255, 244, 212, 0.86);
    }

    .panel li {
      margin: 8px 0;
      line-height: 1.45;
    }

    .close-button {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 244, 212, 0.48);
      border-radius: 999px;
      color: var(--cream);
      background: rgba(0, 0, 0, 0.38);
      font-size: 1.65rem;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
    }

    .close-button:hover,
    .close-button:focus-visible {
      outline: none;
      color: #fff;
      border-color: var(--gold);
      box-shadow: 0 0 18px rgba(232, 197, 110, 0.28);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .photo-card {
      position: relative;
      display: block;
      overflow: hidden;
      min-height: 132px;
      border: 1px solid rgba(232, 197, 110, 0.34);
      border-radius: 14px;
      padding: 0;
      background: rgba(0, 0, 0, 0.42);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.28);
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .photo-card:hover img,
    .photo-card:focus-visible img {
      transform: scale(1.045);
      filter: brightness(1.08);
    }

    .photo-card:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }

    .lightbox-modal {
      z-index: 80;
      align-items: center;
      padding: 12px;
      background: rgba(0, 0, 0, 0.9);
    }

    .lightbox-panel {
      position: relative;
      width: min(100%, 980px);
      max-height: 92svh;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(232, 197, 110, 0.58);
      border-radius: 20px;
      background: rgba(5, 4, 3, 0.96);
      box-shadow: 0 0 48px rgba(0, 0, 0, 0.88);
    }

    .lightbox-panel::before {
      display: none;
    }

    .lightbox-image-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44svh;
      overflow: hidden;
      border-radius: 14px;
      background: #000;
    }

    .lightbox-image {
      display: block;
      max-width: 100%;
      max-height: 72svh;
      object-fit: contain;
    }

    .lightbox-caption {
      margin: 0;
      padding: 0 48px;
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255, 244, 212, 0.72);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 244, 212, 0.5);
      border-radius: 999px;
      color: var(--cream);
      background: rgba(0, 0, 0, 0.56);
      font-size: 1.8rem;
      line-height: 1;
      cursor: pointer;
      transform: translateY(-50%);
    }

    .lightbox-prev {
      left: 16px;
    }

    .lightbox-next {
      right: 16px;
    }

    .lightbox-nav:hover,
    .lightbox-nav:focus-visible {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 18px rgba(232, 197, 110, 0.28);
    }

    .video-panel {
      padding: 22px;
    }

    .video-panel h2 {
      margin-top: 22px;
      font-size: clamp(1.45rem, 6vw, 2.15rem);
    }

    .video-frame {
      overflow: hidden;
      border: 1px solid rgba(232, 197, 110, 0.56);
      border-radius: 16px;
      background: #000;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.52);
    }

    video {
      display: block;
      width: 100%;
      max-height: 68svh;
      background: #000;
    }

    .fallback-note {
      display: block;
      margin-top: 14px;
      color: rgba(255, 244, 212, 0.68);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    @media (min-width: 760px) {
      .page {
        padding: 28px;
      }

      .menu-shell {
        border-radius: 28px;
        overflow: hidden;
      }

      .modal {
        align-items: center;
      }

      .panel {
        border-radius: 24px;
        max-height: min(82vh, 760px);
      }

      .panel::before {
        display: none;
      }

      .photo-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="menu-shell" aria-label="Bonus content DVD menu">
      <img
        class="menu-image"
        src="assets/bonus-menu-mobile-portrait.png"
        alt="Bonus Content DVD menu with sections for Stag Photos, Wedding Stats, Simon and Joe's Chat History, Chris Getting Deplaned, and TBC."
      />

      <button class="hotspot hotspot-stag" type="button" data-section="stag" aria-label="Open Stag Photos"></button>
      <button class="hotspot hotspot-stats" type="button" data-section="stats" aria-label="Open Wedding Stats"></button>
      <button class="hotspot hotspot-chat" type="button" data-section="chat" aria-label="Open Simon and Joe's Chat History"></button>
      <button class="hotspot hotspot-chris" type="button" data-section="chris" aria-label="Play Chris Getting Deplaned"></button>
      <button class="hotspot hotspot-tbc" type="button" data-section="tbc" aria-label="Open TBC"></button>
    </section>
  </main>

  <div class="modal" id="section-modal" aria-hidden="true">
    <article class="panel" role="dialog" aria-modal="true" aria-labelledby="section-title">
      <button class="close-button" type="button" data-close aria-label="Close section">×</button>
      <h2 id="section-title"></h2>
      <div id="section-body"></div>
    </article>
  </div>

  <div class="modal lightbox-modal" id="photo-lightbox" aria-hidden="true">
    <article class="lightbox-panel" role="dialog" aria-modal="true" aria-label="Stag photo viewer">
      <button class="close-button" type="button" data-close-lightbox aria-label="Close photo viewer">×</button>
      <button class="lightbox-nav lightbox-prev" type="button" data-photo-prev aria-label="Previous photo">‹</button>
      <div class="lightbox-image-wrap">
        <img class="lightbox-image" id="lightbox-image" src="" alt="" />
      </div>
      <button class="lightbox-nav lightbox-next" type="button" data-photo-next aria-label="Next photo">›</button>
      <p class="lightbox-caption" id="lightbox-caption"></p>
    </article>
  </div>

  <div class="modal" id="video-modal" aria-hidden="true">
    <article class="panel video-panel" role="dialog" aria-modal="true" aria-labelledby="video-title">
      <button class="close-button" type="button" data-close-video aria-label="Close video">×</button>
      <h2 id="video-title">Chris Getting Deplaned</h2>
      <div class="video-frame">
        <video id="chris-video" controls preload="metadata" playsinline>
          <source src="videos/chris-getting-deplaned.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>
      <span class="fallback-note">Add your video file at <strong>videos/chris-getting-deplaned.mp4</strong>.</span>
    </article>
  </div>

  <script>
    const stagPhotoFiles = [
      "WhatsApp Image 2026-06-18 at 07.36.17.jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.18 (1).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.18 (2).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.18 (3).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.18 (4).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.18 (5).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.18 (6).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.18 (7).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.18 (8).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.18 (9).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.18.jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.19 (1).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.19 (2).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.19.jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.21 (1).jpeg",
      "WhatsApp Image 2026-06-18 at 07.36.21.jpeg"
    ];

    const stagPhotos = stagPhotoFiles.map(function (fileName, index) {
      return {
        src: "Stag Photos/" + encodeURIComponent(fileName),
        alt: "Stag photo " + (index + 1)
      };
    });

    const sections = {
      stag: {
        title: "Stag Photos",
        body: renderStagGallery()
      },
      stats: {
        title: "Wedding Stats",
        body: `
          <p>The official numbers section: speeches, dance moves, drinks, tears, love, and other rigorously peer-reviewed wedding metrics.</p>
          <ul>
            <li>Replace this copy with charts, counters, or animated stats.</li>
            <li>The clickable zone already covers the chart area on the menu image.</li>
          </ul>
        `
      },
      chat: {
        title: "Simon and Joe's Chat History",
        body: `
          <p>An archive of messages, planning chaos, emotional support, and probably one or two lines that should never be read aloud.</p>
          <ul>
            <li>This could link to screenshots, a transcript, or a fake chat interface.</li>
            <li>Keep the good bits. Redact responsibly.</li>
          </ul>
        `
      },
      tbc: {
        title: "TBC",
        body: `
          <p>A mysterious placeholder for future bonus content.</p>
          <ul>
            <li>Drop in a surprise video, gallery, quiz, or Easter egg later.</li>
          </ul>
        `
      }
    };

    const sectionModal = document.getElementById("section-modal");
    const sectionTitle = document.getElementById("section-title");
    const sectionBody = document.getElementById("section-body");
    const videoModal = document.getElementById("video-modal");
    const chrisVideo = document.getElementById("chris-video");
    const photoLightbox = document.getElementById("photo-lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const lightboxCaption = document.getElementById("lightbox-caption");
    let lastFocusedElement = null;
    let currentPhotoIndex = 0;

    function renderStagGallery() {
      const photoCards = stagPhotos.map(function (photo, index) {
        return `
          <button class="photo-card" type="button" data-photo-index="${index}" aria-label="Open stag photo ${index + 1}">
            <img src="${photo.src}" alt="${photo.alt}" loading="lazy" />
          </button>
        `;
      }).join("");

      return `
        <p>The official stag-do evidence locker. Tap any photo to open it full-screen, then swipe-ish with the arrow buttons.</p>
        <div class="photo-grid">
          ${photoCards}
        </div>
      `;
    }

    function openSection(sectionKey) {
      const section = sections[sectionKey];
      if (!section) return;

      lastFocusedElement = document.activeElement;
      sectionTitle.textContent = section.title;
      sectionBody.innerHTML = section.body;
      sectionModal.classList.add("active");
      sectionModal.setAttribute("aria-hidden", "false");
      sectionModal.querySelector("[data-close]").focus();

      if (sectionKey === "stag") {
        sectionBody.querySelectorAll("[data-photo-index]").forEach(function (button) {
          button.addEventListener("click", function () {
            openPhoto(Number(button.dataset.photoIndex));
          });
        });
      }
    }

    function closeSection() {
      sectionModal.classList.remove("active");
      sectionModal.setAttribute("aria-hidden", "true");
      if (lastFocusedElement) lastFocusedElement.focus();
    }

    function openVideo() {
      lastFocusedElement = document.activeElement;
      videoModal.classList.add("active");
      videoModal.setAttribute("aria-hidden", "false");
      videoModal.querySelector("[data-close-video]").focus();

      chrisVideo.play().catch(function () {
        // Mobile browsers may wait for the user to press play.
      });
    }

    function closeVideo() {
      chrisVideo.pause();
      chrisVideo.currentTime = 0;
      videoModal.classList.remove("active");
      videoModal.setAttribute("aria-hidden", "true");
      if (lastFocusedElement) lastFocusedElement.focus();
    }

    function openPhoto(index) {
      currentPhotoIndex = index;
      updatePhoto();
      photoLightbox.classList.add("active");
      photoLightbox.setAttribute("aria-hidden", "false");
      photoLightbox.querySelector("[data-close-lightbox]").focus();
    }

    function closePhoto() {
      photoLightbox.classList.remove("active");
      photoLightbox.setAttribute("aria-hidden", "true");
    }

    function updatePhoto() {
      const photo = stagPhotos[currentPhotoIndex];
      lightboxImage.src = photo.src;
      lightboxImage.alt = photo.alt;
      lightboxCaption.textContent = "Stag photo " + (currentPhotoIndex + 1) + " of " + stagPhotos.length;
    }

    function showNextPhoto() {
      currentPhotoIndex = (currentPhotoIndex + 1) % stagPhotos.length;
      updatePhoto();
    }

    function showPreviousPhoto() {
      currentPhotoIndex = (currentPhotoIndex - 1 + stagPhotos.length) % stagPhotos.length;
      updatePhoto();
    }

    document.querySelectorAll(".hotspot").forEach(function (hotspot) {
      hotspot.addEventListener("click", function () {
        const section = hotspot.dataset.section;
        if (section === "chris") {
          openVideo();
        } else {
          openSection(section);
        }
      });
    });

    document.querySelector("[data-close]").addEventListener("click", closeSection);
    document.querySelector("[data-close-video]").addEventListener("click", closeVideo);
    document.querySelector("[data-close-lightbox]").addEventListener("click", closePhoto);
    document.querySelector("[data-photo-next]").addEventListener("click", showNextPhoto);
    document.querySelector("[data-photo-prev]").addEventListener("click", showPreviousPhoto);

    sectionModal.addEventListener("click", function (event) {
      if (event.target === sectionModal) closeSection();
    });

    videoModal.addEventListener("click", function (event) {
      if (event.target === videoModal) closeVideo();
    });

    photoLightbox.addEventListener("click", function (event) {
      if (event.target === photoLightbox) closePhoto();
    });

    document.addEventListener("keydown", function (event) {
      if (photoLightbox.classList.contains("active")) {
        if (event.key === "ArrowRight") showNextPhoto();
        if (event.key === "ArrowLeft") showPreviousPhoto();
        if (event.key === "Escape") closePhoto();
        return;
      }

      if (event.key !== "Escape") return;
      if (videoModal.classList.contains("active")) closeVideo();
      if (sectionModal.classList.contains("active")) closeSection();
    });
  </script>
</body>
</html>
