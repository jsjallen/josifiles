<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bonus Content</title>
  <style>
    :root {
      --gold: #f4d57b;
      --deep-gold: #a87622;
      --blue: #051c45;
      --blue2: #123a73;
      --glow: rgba(255, 224, 135, 0.9);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--gold);
      background:
        radial-gradient(circle at 50% 45%, rgba(42, 98, 167, 0.9) 0%, rgba(9, 39, 88, 0.98) 34%, #020711 76%),
        linear-gradient(135deg, #000 0%, #071c45 50%, #000 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.045) 0,
          rgba(255,255,255,0.045) 1px,
          transparent 1px,
          transparent 5px
        );
      mix-blend-mode: overlay;
      opacity: 0.45;
      animation: scan 8s linear infinite;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -8%;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,0.65) 82%);
    }

    @keyframes scan {
      from { transform: translateY(-10px); }
      to { transform: translateY(10px); }
    }

    .dvd-frame {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .sparkle {
      position: absolute;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 14px 4px rgba(255,255,255,0.5);
      opacity: 0.55;
      animation: twinkle 3.5s infinite ease-in-out;
    }

    .sparkle:nth-child(1) { width: 3px; height: 3px; top: 16%; left: 18%; animation-delay: 0s; }
    .sparkle:nth-child(2) { width: 2px; height: 2px; top: 24%; right: 21%; animation-delay: 1s; }
    .sparkle:nth-child(3) { width: 4px; height: 4px; bottom: 19%; left: 24%; animation-delay: 1.8s; }
    .sparkle:nth-child(4) { width: 2px; height: 2px; bottom: 29%; right: 18%; animation-delay: 2.4s; }

    @keyframes twinkle {
      0%, 100% { transform: scale(0.75); opacity: 0.25; }
      50% { transform: scale(1.45); opacity: 0.8; }
    }

    .menu {
      width: min(920px, 92vw);
      min-height: min(680px, 86vh);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(28px, 6vw, 70px);
      border: 4px double rgba(244, 213, 123, 0.8);
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(4, 12, 31, 0.62), rgba(14, 58, 119, 0.35)),
        radial-gradient(circle at 50% 0%, rgba(255, 221, 130, 0.12), transparent 36%);
      box-shadow:
        0 0 46px rgba(0,0,0,0.9),
        inset 0 0 40px rgba(244, 213, 123, 0.14),
        inset 0 0 100px rgba(0,0,0,0.35);
      isolation: isolate;
    }

    .menu::before,
    .menu::after {
      content: "";
      position: absolute;
      inset: 22px;
      border-radius: 24px;
      pointer-events: none;
    }

    .menu::before {
      border: 1px solid rgba(244, 213, 123, 0.42);
      box-shadow: inset 0 0 28px rgba(244, 213, 123, 0.1);
    }

    .menu::after {
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,0.09), transparent),
        linear-gradient(transparent, rgba(255,255,255,0.04), transparent);
      transform: skewX(-12deg);
      opacity: 0.55;
      z-index: -1;
    }

    .eyebrow {
      margin: 0 0 8px;
      font: 700 clamp(0.82rem, 1.6vw, 1rem) Arial, Helvetica, sans-serif;
      letter-spacing: 0.46em;
      text-transform: uppercase;
      color: #f9e8ac;
      text-shadow: 0 0 8px rgba(255, 226, 140, 0.75);
    }

    h1 {
      margin: 0 0 clamp(34px, 6vh, 58px);
      font-size: clamp(3rem, 9vw, 7rem);
      line-height: 0.82;
      text-align: center;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--gold);
      -webkit-text-stroke: 1px rgba(99, 55, 8, 0.7);
      text-shadow:
        0 3px 0 #6e3c0a,
        0 8px 18px rgba(0,0,0,0.95),
        0 0 24px rgba(255, 219, 118, 0.45);
    }

    nav {
      width: min(590px, 100%);
      display: grid;
      gap: 13px;
    }

    .menu-link {
      --shift: 0px;
      position: relative;
      display: block;
      padding: 15px 24px 15px 54px;
      border-radius: 999px;
      color: #ffe8a5;
      text-decoration: none;
      font: 700 clamp(1.05rem, 2.6vw, 1.75rem) Arial, Helvetica, sans-serif;
      letter-spacing: 0.045em;
      text-transform: uppercase;
      background: linear-gradient(90deg, rgba(255, 215, 112, 0.2), rgba(255, 215, 112, 0.04) 62%, transparent);
      border: 1px solid rgba(244, 213, 123, 0.38);
      box-shadow: inset 0 0 18px rgba(244, 213, 123, 0.08), 0 9px 18px rgba(0,0,0,0.32);
      text-shadow: 0 2px 2px #000, 0 0 10px rgba(255, 225, 145, 0.38);
      transform: translateX(var(--shift));
      transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease, color 180ms ease;
    }

    .menu-link:nth-child(2) { --shift: 22px; }
    .menu-link:nth-child(3) { --shift: -10px; }
    .menu-link:nth-child(4) { --shift: 18px; }
    .menu-link:nth-child(5) { --shift: -18px; }

    .menu-link::before {
      content: "▶";
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8em;
      color: #fff3c4;
      opacity: 0;
      text-shadow: 0 0 12px var(--glow);
      transition: opacity 150ms ease, left 150ms ease;
    }

    .menu-link:hover,
    .menu-link:focus-visible {
      color: #fff8d9;
      outline: none;
      background: linear-gradient(90deg, rgba(244, 213, 123, 0.48), rgba(244, 213, 123, 0.13) 70%, transparent);
      box-shadow:
        inset 0 0 22px rgba(255, 238, 184, 0.24),
        0 0 24px rgba(255, 219, 118, 0.42),
        0 10px 20px rgba(0,0,0,0.42);
      transform: translateX(calc(var(--shift) + 13px)) scale(1.025);
    }

    .menu-link:hover::before,
    .menu-link:focus-visible::before {
      opacity: 1;
      left: 20px;
    }

    .footer {
      position: absolute;
      bottom: 26px;
      left: 0;
      right: 0;
      text-align: center;
      font: 700 0.72rem Arial, Helvetica, sans-serif;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255, 232, 165, 0.62);
      text-shadow: 0 0 10px rgba(255, 232, 165, 0.45);
    }

    .disc {
      position: absolute;
      width: min(36vw, 265px);
      aspect-ratio: 1;
      right: max(-82px, -7vw);
      bottom: max(-82px, -8vw);
      border-radius: 50%;
      background:
        radial-gradient(circle, transparent 0 12%, rgba(255,255,255,0.8) 12.5% 14%, transparent 14.5% 100%),
        conic-gradient(from 20deg, rgba(255,255,255,0.12), rgba(244,213,123,0.18), rgba(58,119,194,0.25), rgba(255,255,255,0.08), rgba(244,213,123,0.2), rgba(255,255,255,0.12));
      opacity: 0.34;
      filter: blur(0.2px);
      pointer-events: none;
    }

    @media (max-width: 650px) {
      body { overflow: auto; }
      .menu { min-height: 82vh; border-radius: 22px; }
      .menu-link { transform: none; padding-left: 48px; }
      .menu-link:nth-child(n) { --shift: 0px; }
      .footer { position: static; margin-top: 28px; }
      .disc { display: none; }
    }
  </style>
</head>
<body>
  <main class="dvd-frame" aria-label="Bonus content DVD menu">
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>

    <section class="menu">
      <p class="eyebrow">Wedding DVD</p>
      <h1>Bonus<br>Content</h1>

      <nav aria-label="Bonus content links">
        <a class="menu-link" href="#stag-photos">Stag Photos</a>
        <a class="menu-link" href="#wedding-stats">Wedding Stats</a>
        <a class="menu-link" href="#chat-history">Simon and Joe's Chat History</a>
        <a class="menu-link" href="#deplaned">Chris getting deplaned</a>
        <a class="menu-link" href="#tbc">TBC</a>
      </nav>

      <div class="disc" aria-hidden="true"></div>
      <div class="footer">Select a chapter</div>
    </section>
  </main>
</body>
</html>
